<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Inteli Jr</title>

    <!-- Import do Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Import do Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Import dos arquivos CSS -->
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/agenda.css">
    <link rel="stylesheet" href="../css/comunidade.css">
    <link rel="stylesheet" href="../css/config.css">
    <link rel="stylesheet" href="../css/projetos.css">
    <link rel="stylesheet" href="../css/kanban.css">
    <link rel="stylesheet" href="../css/insights.css">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../assets/logo.png">

    <!-- Import do arquivo JavaScript principal -->
    <script type="module" src="../js/global.js"></script>
</head>

<body>
    <div class="container">
        <!-- Barra lateral de navegação -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="../assets/logo.png" alt="Logo Inteli Júnior" class="brand-logo">
            </div>

            <nav aria-label="Menu principal">
                <ul class="nav-links">
                    <li>
                        <button class="nav-btn active" data-target="projetos" aria-current="page">
                            <i class="ph ph-kanban"></i> <span class="nav-text">Projetos</span>
                        </button>
                    </li>
                    <li>
                        <button class="nav-btn" data-target="agenda">
                            <i class="ph ph-calendar"></i> <span class="nav-text">Agenda</span>
                        </button>
                    </li>
                    <li>
                        <button class="nav-btn" data-target="comunidade">
                            <i class="ph ph-users"></i> <span class="nav-text">Comunidade</span>
                        </button>
                    </li>
                    <li>
                        <button class="nav-btn" data-target="insights">
                            <i class="ph ph-brain"></i> <span class="nav-text">Insights</span>
                        </button>
                    </li>
                    <li>
                        <button class="nav-btn" data-target="config">
                            <i class="ph ph-gear"></i> <span class="nav-text">Configurações</span>
                        </button>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <button class="collapse-btn" id="btn-collapse" title="Recolher/Expandir Menu">
                    <i class="ph ph-caret-double-left" id="collapse-icon"></i>
                </button>
            </div>
        </aside>

        <!-- Área principal de conteúdo, onde as telas serão carregadas dinamicamente -->
        <main class="content" id="app-content">
        </main>
    </div>
</body>

</html>
