<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case</title>

    <!-- Import do Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Import do Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Import dos arquivos CSS -->
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/agenda.css">
    <link rel="stylesheet" href="../css/comunidade.css">
    <link rel="stylesheet" href="../css/config.css">
    <link rel="stylesheet" href="../css/projetos.css">
    <link rel="stylesheet" href="../css/kanban.css">
    <link rel="stylesheet" href="../css/insights.css">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../assets/logo.png">

    <!-- Import do arquivo JavaScript principal -->
    <script type="module" src="../js/global.js"></script>
</head>

<body>
    <div class="container">
        <!-- Barra lateral de navegação -->
        <aside class="sidebar">
            <!-- Cabeçalho da sidebar com logo -->
            <div class="sidebar-header">
                <img src="../assets/logo.png" alt="Logo Inteli Júnior" class="brand-logo">
            </div>
            <!-- Navegação principal -->
            <nav aria-label="Menu principal">
                <!-- Lista de links de navegação -->
                <ul class="nav-links">
                    <!-- Cada item de navegação é um botão com ícone e texto -->
                    <li>
                        <button class="nav-btn active" data-target="projetos" aria-current="page">
                            <i class="ph ph-kanban"></i> Projetos
                        </button>
                    </li>
                    <li>
                        <button class="nav-btn" data-target="agenda">
                            <i class="ph ph-calendar"></i> Agenda
                        </button>
                    </li>
                    <li>
                        <button class="nav-btn" data-target="comunidade">
                            <i class="ph ph-users"></i> Comunidade
                        </button>
                    </li>
                    <li>
                        <button class="nav-btn" data-target="insights">
                            <i class="ph ph-brain"></i> Insights
                        </button>
                    </li>
                    <li>
                        <button class="nav-btn" data-target="config">
                            <i class="ph ph-gear"></i> Configurações
                        </button>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- Área principal de conteúdo, onde as telas serão carregadas dinamicamente -->
        <main class="content" id="app-content">
        </main>
    </div>
</body>

</html>
